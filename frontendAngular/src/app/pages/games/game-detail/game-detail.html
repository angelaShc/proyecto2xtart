<div class="game-play-container">
  @if (!isLoading()) {
    @if (game() && gameUrl) {
      <div class="header-game">
        <h1>Game: <span>{{ game().titulo }}</span></h1>
        <button routerLink="/games" class="btn-back">⬅ Volver</button>
      </div>

      <div class="unity-wrapper">
        <iframe 
          [src]="gameUrl" 
          width="100%" 
          height="600" 
          frameborder="0" 
          allowfullscreen
          loading="lazy">
        </iframe>

      </div>

      <div class="download-section">
        <h3>¿Quieres la versión de escritorio?</h3>
        @if (game().urlDescarga) {
          <a [href]="game().urlDescarga" class="download-link" target="_blank">
            Descargar para Windows/Mac
          </a>
        }
      </div>
    } @else {
      <div class="error-state">
        <p>No se pudo encontrar el archivo del juego.</p>
      </div>
    }
  } @else {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Cargando datos...</p>
    </div>
  }
</div>
