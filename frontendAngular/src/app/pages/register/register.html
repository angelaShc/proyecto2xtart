<div class="login-page"> <div class="login-card">
    <div class="login-header">
      <h2>Crear <span>Cuenta</span></h2>
      <p>Únete a la comunidad de jugadores.</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <div class="input-group">
        <label>Usuario</label>
        <input formControlName="username" placeholder="Tu nombre de guerrero..." type="text">
      </div>

      <div class="input-group">
        <label>Correo Electrónico</label>
        <input formControlName="email" placeholder="ejemplo@correo.com" type="email">
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input formControlName="password" placeholder="Mínimo 6 caracteres" type="password">
      </div>

      <button type="submit" class="login-btn" [disabled]="registerForm.invalid">
        Finalizar Registro
      </button>

      @if (errorMessage) {
        <div class="error-container">
          <p class="error-message">{{ errorMessage }}</p>
        </div>
      }
    </form>
    
    <div class="login-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a></p>
    </div>
  </div>
</div>
